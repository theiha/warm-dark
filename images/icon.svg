  />
  <path
    d="M24 356C74 345 120 344 174 353C228 362 274 377 328 370C382 364 422 347 470 342C477 341 483 341 488 341V488H24Z"
    fill="url(#dune2)"
  />
  <path
    d="M24 392C80 375 130 371 188 380C244 389 288 404 340 402C396 400 438 384 488 376V488H24Z"
    fill="url(#dune3)"
  />
  <path
    d="M24 430C82 410 138 405 196 414C250 422 293 438 344 438C400 438 442 424 488 416V488H24Z"
